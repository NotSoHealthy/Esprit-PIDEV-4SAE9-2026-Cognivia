apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: pidev-deployment
type: Opaque
stringData:
  KC_BOOTSTRAP_ADMIN_USERNAME: admin
  KC_BOOTSTRAP_ADMIN_PASSWORD: admin
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: pidev-deployment
data:
  KC_HTTP_PORT: "8180"
  KC_HOSTNAME_STRICT: "false"
  KC_HOSTNAME_STRICT_HTTPS: "false"
  KC_HEALTH_ENABLED: "true"
  KC_DB: "postgres"
  KC_DB_SCHEMA: "public"
  KC_HOSTNAME: "auth.local"
  KC_PROXY_HEADERS: "xforwarded"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: pidev-deployment
data:
  realm.json: |
    {
      "realm": "pidev",
      "enabled": true,
      "accessTokenLifespan": 3600,
      "ssoSessionIdleTimeout": 3600,
      "roles": {
        "realm": [
          {
            "name": "ROLE_UNVERIFIED"
          },
          {
            "name": "ROLE_ADMIN"
          },
          {
            "name": "ROLE_DOCTOR"
          },
          {
            "name": "ROLE_CAREGIVER"
          },
          {
            "name": "ROLE_PATIENT"
          },
          {
            "name": "ROLE_PHARMACY"
          }
        ]
      },
      "clients": [
        {
          "clientId": "pidev-frontend",
          "name": "PIDEV Angular FrontEnd",
          "protocol": "openid-connect",
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "http://localhost:4200/*",
            "http://localhost:*/*",
            "http://127.0.0.1:*/*",
            "http://192.168.49.2:*/*",
            "http://app.local",
            "http://app.local/",
            "http://app.local/*"
          ],
          "webOrigins": [
            "*"
          ]
        }
      ],
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "emailVerified": true,
          "email": "admin@example.com",
          "credentials": [
            {
              "type": "password",
              "value": "admin123",
              "temporary": false
            }
          ],
          "realmRoles": [
            "ROLE_ADMIN"
          ]
        },
        {
          "username": "doctor1",
          "enabled": true,
          "emailVerified": true,
          "email": "doctor1@example.com",
          "credentials": [
            {
              "type": "password",
              "value": "doctor123",
              "temporary": false
            }
          ],
          "realmRoles": [
            "ROLE_DOCTOR"
          ]
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-theme-cognivia
  namespace: pidev-deployment
data:
  theme.properties: |
    parent=keycloak
    import=common/keycloak
    styles=css/styles.css
    locales=en,fr,ar

  login.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayInfo=(social.displayInfo!false) displayMessage=false displayRequiredFields=false bodyClass="login-page"; section>
        <#if (section!"") = "header">
            <#-- Title moved into form -->
        <#elseif (section!"") = "form">
            <h1 id="kc-page-title">${msg("customSignIn")}</h1>

            <form id="kc-login-form" onsubmit="login.disabled = true; return true;" action="${url.loginAction}" method="post">
                <div class="form-group">
                    <input id="username" name="username" value="${(login.username!'')}" type="text" required autocomplete="on" placeholder="${msg("customUsernameOrEmail")}" />
                </div>

                <div class="form-group">
                    <input id="password" name="password" type="password" required autocomplete="off" placeholder="${msg("customPassword")}" />
                </div>

                <div class="form-group">
                    <input class="btn-primary" name="login" id="kc-login" type="submit" value="${msg("customSignIn")}" />
                </div>
            </form>

            <#if realm.password && social.providers?? && social.providers?has_content>
                <div id="kc-social-providers">
                    <div class="separator">OR</div>
                    <div class="registration-social-label">${msg("customConnectWith")}</div>
                    <ul>
                        <#list social.providers as p>
                            <li>
                                <a href="${p.loginUrl}" id="zocial-${p.alias}" class="zocial ${p.alias}">
                                    <#if p.alias == "google">
                                        <img src="https://www.vectorlogo.zone/logos/google/google-icon.svg" alt="Google">
                                        <span>Google</span>
                                    <#elseif p.alias == "facebook">
                                        <img src="https://www.vectorlogo.zone/logos/facebook/facebook-official.svg" alt="Facebook">
                                        <span>Facebook</span>
                                    <#else>
                                        <span>${p.displayName!}</span>
                                    </#if>
                                </a>
                            </li>
                        </#list>
                    </ul>
                </div>
            </#if>

            <#if realm.password && realm.registrationAllowed && !registrationDisabled??>
                <div class="registration-footer">
                    ${msg("customNoAccount")} <a href="${url.registrationUrl}">${msg("customSignUp")}</a>
                </div>
            </#if>
        </#if>
    </@layout.registrationLayout>

  register.ftl: |
    <#import "template.ftl" as layout>
    <@layout.registrationLayout displayInfo=(social.displayInfo!false) displayMessage=true displayRequiredFields=false bodyClass="register-page"; section>
        <#if (section!"") = "header">
            <#-- Title moved into form -->
        <#elseif (section!"") = "form">
            <h1 id="kc-page-title">${msg("customCreateProfile")}</h1>

            <form id="kc-register-form" action="${url.registrationAction}" method="post">
                <div class="form-group">
                    <input type="email" required id="email" name="email" value="${(register.formData.email!'')}"
                           placeholder="${msg("customEmail")}" autocomplete="email" />
                </div>

                <#if passwordRequired??>
                    <div class="form-group">
                        <input type="password" required id="password" name="password"
                               placeholder="${msg("customPassword")}" autocomplete="new-password" />
                    </div>

                    <div class="form-group">
                        <input type="password" required id="password-confirm" name="password-confirm"
                               placeholder="${msg("customConfirmPassword")}" autocomplete="new-password" />
                    </div>
                </#if>

                <div class="form-group">
                    <input type="tel"
                           required
                           id="user.attributes.phoneNumber"
                           name="user.attributes.phoneNumber"
                           value="${(register.formData['user.attributes.phoneNumber']!'')}"
                           placeholder="${msg("customPhone")}"
                           autocomplete="tel"
                           pattern="[0-9]{8}"
                           maxlength="8"
                           title="Please enter exactly 8 digits" />
                </div>

                <div class="form-group">
                    <select id="user.attributes.role" required name="user.attributes.role" class="kc-select">
                        <option value="" disabled <#if !(register.formData['user.attributes.role']?has_content)>selected</#if>>${msg("customRole")}</option>
                        <option value="doctor" <#if (register.formData['user.attributes.role']!'') == 'doctor'>selected</#if>>${msg("customRoleDoctor")}</option>
                        <option value="caregiver" <#if (register.formData['user.attributes.role']!'') == 'caregiver'>selected</#if>>${msg("customRoleCaregiver")}</option>
                        <option value="patient" <#if (register.formData['user.attributes.role']!'') == 'patient'>selected</#if>>${msg("customRolePatient")}</option>
                    </select>
                </div>

                <div class="form-group">
                    <input class="btn-primary" type="submit" value="${msg("customSignUp")}" />
                </div>
            </form>

            <#if realm.password && social.providers?? && social.providers?has_content>
                <div id="kc-social-providers">
                    <div class="separator">OR</div>
                    <div class="registration-social-label">${msg("customConnectWith")}</div>
                    <ul>
                        <#list social.providers as p>
                            <li>
                                <a href="${p.loginUrl}" id="zocial-${p.alias}" class="zocial ${p.alias}">
                                    <#if p.alias == "google">
                                        <img src="https://www.vectorlogo.zone/logos/google/google-icon.svg" alt="Google">
                                        <span>Google</span>
                                    <#elseif p.alias == "facebook">
                                        <img src="https://www.vectorlogo.zone/logos/facebook/facebook-official.svg" alt="Facebook">
                                        <span>Facebook</span>
                                    <#else>
                                        <span>${p.displayName!}</span>
                                    </#if>
                                </a>
                            </li>
                        </#list>
                    </ul>
                </div>
            </#if>

            <div class="registration-footer">
                ${msg("customTerms")} <a href="#">${msg("customTermsLink")}</a> ${msg("customAnd")} <a href="#">${msg("customPrivacy")}</a>
            </div>
        </#if>
    </@layout.registrationLayout>

  template.ftl: |
    <#macro registrationLayout bodyClass="" displayInfo=false displayMessage=true displayRequiredFields=false showAnotherWayIfPresent=true>
    <!DOCTYPE html>
    <html class="${properties.kcHtmlClass!}">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
        <meta name="robots" content="noindex, nofollow">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>${msg("loginTitle",(realm.displayName!''))}</title>
        <link rel="icon" href="${url.resourcesPath}/img/favicon.ico" />
        <#if properties.styles?has_content>
            <#list properties.styles?split(' ') as style>
                <link href="${url.resourcesPath}/${style}" rel="stylesheet" />
            </#list>
        </#if>
    </head>

    <body class="${properties.kcBodyClass!}">
        <header class="cognivia-header">
            <a href="http://app.local" class="header-logo">
                <img src="https://cdn.builder.io/api/v1/image/assets%2Fd3d69403f729419ab22b58accb7875b9%2F9db03c941d394af5b6ff65a035e69fd5?format=webp&width=800&height=1200" alt="Cognivia Logo" class="logo-img">
                <span class="logo-text">cognivia</span>
            </a>

            <div class="header-right">
                <div class="header-lang" id="kc-lang-toggle">
                    <span>${msg("customSiteLanguage")}: <span id="current-lang-text">${(locale.current)!'English'}</span></span>
                    <svg class="lang-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 9l-7 7-7-7"></path>
                    </svg>
                    <div class="lang-dropdown" id="kc-lang-dropdown">
                        <#if realm.internationalizationEnabled && (locale.supported)?? && locale.supported?size gt 1>
                            <#list locale.supported as l>
                                <a href="${l.url}" class="lang-item" data-locale="${l.label}">${l.label}</a>
                            </#list>
                        <#else>
                            <a href="#" class="lang-item" data-locale="en">English</a>
                            <a href="#" class="lang-item" data-locale="fr">Français</a>
                            <a href="#" class="lang-item" data-locale="ar">Arabic</a>
                        </#if>
                    </div>
                </div>
            </div>

            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    var toggle = document.getElementById('kc-lang-toggle');
                    var dropdown = document.getElementById('kc-lang-dropdown');

                    toggle.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var isVisible = dropdown.style.display === 'block';
                        dropdown.style.display = isVisible ? 'none' : 'block';
                    });

                    document.addEventListener('click', function() {
                        dropdown.style.display = 'none';
                    });

                    var langItems = document.querySelectorAll('.lang-item');
                    langItems.forEach(function(item) {
                        item.addEventListener('click', function(e) {
                            var href = this.getAttribute('href');
                            if (href === '#') {
                                e.preventDefault();
                                var locale = this.getAttribute('data-locale').toLowerCase().substring(0, 2);
                                var url = new URL(window.location.href);
                                url.searchParams.set('kc_locale', locale);
                                window.location.href = url.toString();
                            } else {
                                try {
                                    var url = new URL(href, window.location.origin);
                                    var currentParams = new URLSearchParams(window.location.search);
                                    currentParams.forEach((value, key) => {
                                        if (key !== 'kc_locale') url.searchParams.set(key, value);
                                    });
                                    this.setAttribute('href', url.toString());
                                } catch(err) {}
                            }
                        });
                    });

                    var urlParams = new URLSearchParams(window.location.search);
                    var currentLocale = urlParams.get('ui_locales') || urlParams.get('kc_locale');
                    if (currentLocale) {
                        var localeMap = {
                            'en': 'English',
                            'fr': 'Français',
                            'ar': 'Arabic'
                        };
                        var langName = localeMap[currentLocale.toLowerCase().substring(0, 2)];
                        if (langName) {
                            document.getElementById('current-lang-text').textContent = langName;
                        }
                    }
                });
            </script>
        </header>

        <div id="kc-container">
            <div id="kc-container-wrapper">
                <div class="top-nav-container">
                    <#if (pageId!"") = "register">
                        <a href="${url.loginUrl}" class="btn-header-outline">${msg("customSignIn")}</a>
                    <#elseif (pageId!"") = "login">
                        <#if realm.password && realm.registrationAllowed && !registrationDisabled??>
                            <a href="${url.registrationUrl}" class="btn-header-outline">${msg("customSignUp")}</a>
                        </#if>
                    </#if>
                </div>
                <div id="kc-content">
                    <div id="kc-content-wrapper">

                        <#if displayMessage && message?has_content && (message.type != 'warning' || !((isAppInitiatedAction)??))>
                            <div class="alert-${message.type} ${properties.kcAlertClass!}">
                                <span class="kc-feedback-text">${kcSanitize(message.summary)?no_esc}</span>
                            </div>
                        </#if>

                        <#nested "header">
                        <#nested "form">
                        <#nested "info">
                    </div>
                </div>
            </div>
        </div>
    </body>
    </html>
    </#macro>

