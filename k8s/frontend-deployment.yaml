apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: notsohealthy/pidev-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-env
              mountPath: /usr/share/nginx/html/env.js
              subPath: env.js
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20

        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.1.0
          imagePullPolicy: IfNotPresent
          args:
            - -nginx.scrape-uri=http://127.0.0.1/stub_status
          ports:
            - containerPort: 9113
      volumes:
        - name: frontend-env
          configMap:
            name: pidev-frontend-env
            items:
              - key: env.js
                path: env.js
        - name: nginx-conf
          configMap:
            name: frontend-nginx-conf
            items:
              - key: default.conf
                path: default.conf
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pidev-deployment
  labels:
    app: frontend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "9113"
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: metrics
      port: 9113
      targetPort: 9113
  type: ClusterIP
