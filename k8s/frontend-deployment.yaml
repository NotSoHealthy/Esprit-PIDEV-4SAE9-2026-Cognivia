apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: notsohealthy/pidev-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-env
              mountPath: /usr/share/nginx/html/env.js
              subPath: env.js
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: frontend-env
          configMap:
            name: pidev-frontend-env
            items:
              - key: env.js
                path: env.js
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pidev-deployment
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
