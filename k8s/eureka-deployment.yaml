apiVersion: v1
kind: ConfigMap
metadata:
  name: eureka-config
  namespace: pidev-deployment
data:
  PORT: "8761"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: notsohealthy/pidev-eureka:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
          env:
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: eureka-config
            - configMapRef:
                name: service-links
            - secretRef:
                name: secret
---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: pidev-deployment
  labels:
    app: eureka
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8761"
spec:
  selector:
    app: eureka
  ports:
    - name: http
      port: 8761
      targetPort: 8761
  type: ClusterIP