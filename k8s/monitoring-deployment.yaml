apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: pidev-deployment
data:
  PORT: "8082"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring
  template:
    metadata:
      labels:
        app: monitoring
    spec:
      containers:
        - name: monitoring
          image: notsohealthy/pidev-monitoring:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          envFrom:
            - configMapRef:
                name: monitoring-config
            - configMapRef:
                name: service-links
            - secretRef:
                name: secret
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring
  namespace: pidev-deployment
  labels:
    app: monitoring
spec:
  selector:
    app: monitoring
  ports:
    - name: http
      port: 8082
      targetPort: 8082
