apiVersion: v1
kind: ConfigMap
metadata:
  name: pharmacy-config
  namespace: pidev-deployment
data:
  PORT: "8091"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharmacy
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pharmacy
  template:
    metadata:
      labels:
        app: pharmacy
    spec:
      containers:
        - name: pharmacy
          image: notsohealthy/pidev-pharmacy:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: pharmacy-config
            - configMapRef:
                name: service-links
            - secretRef:
                name: secret
---
apiVersion: v1
kind: Service
metadata:
  name: pharmacy
  namespace: pidev-deployment
  labels:
    app: pharmacy
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8091"
spec:
  selector:
    app: pharmacy
  ports:
    - name: http
      port: 8091
      targetPort: 8091
