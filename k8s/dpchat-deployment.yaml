apiVersion: v1
kind: ConfigMap
metadata:
  name: dpchat-config
  namespace: pidev-deployment
data:
  PORT: "8086"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USERNAME: "guest"
  RABBITMQ_PASSWORD: "guest"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpchat
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dpchat
  template:
    metadata:
      labels:
        app: dpchat
    spec:
      containers:
        - name: dpchat
          image: notsohealthy/pidev-dpchat:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: dpchat-config
            - configMapRef:
                name: service-links
            - secretRef:
                name: secret
---
apiVersion: v1
kind: Service
metadata:
  name: dpchat
  namespace: pidev-deployment
  labels:
    app: dpchat
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8086"
spec:
  selector:
    app: dpchat
  ports:
    - name: http
      port: 8086
      targetPort: 8086
