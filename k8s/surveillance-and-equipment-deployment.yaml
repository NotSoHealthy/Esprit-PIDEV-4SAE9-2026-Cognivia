apiVersion: v1
kind: ConfigMap
metadata:
  name: surveillance-and-equipment-config
  namespace: pidev-deployment
data:
  PORT: "8083"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: surveillance-and-equipment
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: surveillance-and-equipment
  template:
    metadata:
      labels:
        app: surveillance-and-equipment
    spec:
      containers:
        - name: surveillance-and-equipment
          image: notsohealthy/pidev-surveillance-and-equipment:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: surveillance-and-equipment-config
            - configMapRef:
                name: service-links
            - secretRef:
                name: secret
---
apiVersion: v1
kind: Service
metadata:
  name: surveillance-and-equipment
  namespace: pidev-deployment
  labels:
    app: surveillance-and-equipment
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8083"
spec:
  selector:
    app: surveillance-and-equipment
  ports:
    - name: http
      port: 8083
      targetPort: 8083
