apiVersion: v1
kind: ConfigMap
metadata:
  name: forum-service-config
  namespace: pidev-deployment
data:
  PORT: "8089"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forum-service
  namespace: pidev-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forum-service
  template:
    metadata:
      labels:
        app: forum-service
    spec:
      containers:
        - name: forum-service
          image: notsohealthy/pidev-forum-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
          env:
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
            - name: EUREKA_INSTANCE_IP_ADDRESS
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EUREKA_INSTANCE_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,prometheus"
            - name: MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED
              value: "true"
            - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
              value: "true"
          envFrom:
            - configMapRef:
                name: forum-service-config
            - configMapRef:
                name: service-links
            - secretRef:
                name: secret
---
apiVersion: v1
kind: Service
metadata:
  name: forum-service
  namespace: pidev-deployment
  labels:
    app: forum-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/actuator/prometheus"
    prometheus.io/port: "8089"
spec:
  selector:
    app: forum-service
  ports:
    - name: http
      port: 8089
      targetPort: 8089
