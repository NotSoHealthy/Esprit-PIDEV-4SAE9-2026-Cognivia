spring.application.name=pharmacy
spring.datasource.url=${PIDEV26_DB_URL}/pharmacy?sslmode=require&channel_binding=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}

eureka.client.service-url.defaultZone=${EUREKA_LINK:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true

server.port=${PORT:8091}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

imgbb.apiKey=${IMGBB_API_KEY:}

deepseek.api.base-url=https://api.deepseek.com/chat/completions
deepseek.api.model=deepseek-chat
deepseek.api.key=${DEEPSEEK_API_KEY:}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
