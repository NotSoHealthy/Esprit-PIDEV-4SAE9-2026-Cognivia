spring.application.name=DPCHAT
server.port=${PORT:8086}

#eureka
eureka.client.service-url.defaultZone=${EUREKA_LINK:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true

# PostgreSQL - Neon (dpchat database)
spring.datasource.url=${PIDEV26_DB_URL}/dpchat?sslmode=require
spring.datasource.jdbc-url=${PIDEV26_DB_URL}/dpchat?sslmode=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# PostgreSQL - Neon (Care)
care.datasource.url=${PIDEV26_DB_URL}/care?sslmode=require
care.datasource.jdbc-url=${PIDEV26_DB_URL}/care?sslmode=require
care.datasource.username=${PIDEV26_DB_USERNAME}
care.datasource.password=${PIDEV26_DB_PASSWORD}
care.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL - Neon (Pharmacy)
pharmacy.datasource.url=${PIDEV26_DB_URL}/pharmacy?sslmode=require
pharmacy.datasource.jdbc-url=${PIDEV26_DB_URL}/pharmacy?sslmode=require
pharmacy.datasource.username=${PIDEV26_DB_USERNAME}
pharmacy.datasource.password=${PIDEV26_DB_PASSWORD}
pharmacy.datasource.driver-class-name=org.postgresql.Driver

# Message Encryption
chat.encryption.secret=PideV26_Secret_Privacy_Key_@32ch

# AI Configuration
google.ai.api.key=${GOOGLE_AI_KEY:}
