spring.application.name=notifications
spring.datasource.url=${PIDEV26_DB_URL}/notifications?sslmode=require&channel_binding=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}

eureka.client.service-url.defaultZone=${EUREKA_LINK:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
spring.cloud.discovery.client.health-indicator.enabled=false

server.port=${PORT:8090}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.rabbitmq.port=5672