spring.application.name=care
spring.datasource.url=${PIDEV26_DB_URL}/care?sslmode=require&channel_binding=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}

eureka.client.service-url.defaultZone=${EUREKA_LINK:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true

server.port=${PORT:8081}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

keycloak.base-url=${KEYCLOAK_LINK:http://localhost:8180/realms/pidev}
keycloak.realm=pidev
keycloak.client-id=service-client
keycloak.client-secret=${PIDEV26_KEYCLOAK_CLIENT_SECRET}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}