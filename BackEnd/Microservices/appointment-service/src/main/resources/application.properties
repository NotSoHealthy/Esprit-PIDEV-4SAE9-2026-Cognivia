spring.application.name=appointment-service



# ===============================
# DATABASE (Neon Postgres)
# ===============================


# IMPORTANT: DB name ???
spring.datasource.url=jdbc:postgresql://ep-dark-field-agpu069g-pooler.c-2.eu-central-1.aws.neon.tech/appointment?sslmode=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}

server.port=8085


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

# ===============================
# KEYCLOAK (si utilisť plus tard)
# ===============================
keycloak.base-url=http://localhost:8180
keycloak.realm=pidev
keycloak.client-id=service-client
keycloak.client-secret=${PIDEV26_KEYCLOAK_CLIENT_SECRET:}