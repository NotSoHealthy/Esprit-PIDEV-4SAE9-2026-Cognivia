spring.application.name=forum-service
server.port=8085

# PostgreSQL - Neon (Forum)
spring.datasource.url=${PIDEV26_DB_URL}/forum?sslmode=require
spring.datasource.jdbc-url=${PIDEV26_DB_URL}/forum?sslmode=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# PostgreSQL - Neon (Care)
care.datasource.url=${PIDEV26_DB_URL}/care?sslmode=require
care.datasource.jdbc-url=${PIDEV26_DB_URL}/care?sslmode=require
care.datasource.username=${PIDEV26_DB_USERNAME}
care.datasource.password=${PIDEV26_DB_PASSWORD}
care.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

#eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

# Google AI (Gemini)
google.ai.api.key="el api key here"
