spring.application.name=SurveillanceAndEquipment
spring.datasource.url=${PIDEV26_DB_URL}/SurveillanceAndEquipment?sslmode=require
spring.datasource.username=${PIDEV26_DB_USERNAME}
spring.datasource.password=${PIDEV26_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
#Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_LINK:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true

server.port=${PORT:8083}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
