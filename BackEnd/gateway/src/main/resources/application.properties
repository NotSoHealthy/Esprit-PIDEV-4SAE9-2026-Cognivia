spring.application.name=gateway
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/pidev
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedOriginPatterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowCredentials=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true

server.port=8080


# =====================
# ROUTE APPOINTMENTS
# =====================
spring.cloud.gateway.routes[0].id=appointment-service
spring.cloud.gateway.routes[0].uri=lb://APPOINTMENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/appointments/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/appointments(?<segment>/?.*),/api/appointments$\{segment}


# --- CARE : /care/** -> lb://CARE
spring.cloud.gateway.routes[1].id=care-service
spring.cloud.gateway.routes[1].uri=lb://CARE
spring.cloud.gateway.routes[1].predicates[0]=Path=/care/**