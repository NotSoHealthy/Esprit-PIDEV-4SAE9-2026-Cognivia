spring.application.name=gateway
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/pidev
spring.cloud.gateway.server.webflux.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedOriginPatterns=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowCredentials=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true

server.port=8080

# Routes
spring.cloud.gateway.server.webflux.routes[0].id=DPCHAT
spring.cloud.gateway.server.webflux.routes[0].uri=lb://DPCHAT
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/chat/**

spring.cloud.gateway.server.webflux.routes[1].id=FORUM-SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri=lb://FORUM-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/**
