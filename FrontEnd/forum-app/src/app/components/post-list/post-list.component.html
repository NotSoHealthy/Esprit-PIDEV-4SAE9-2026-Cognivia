<div class="container">
  <h1>Forum Posts</h1>
  
  <button mat-raised-button color="primary" routerLink="/posts/new" class="create-btn">
    <mat-icon>add</mat-icon> Create New Post
  </button>

  <div class="post-list">
    <mat-card *ngFor="let post of posts" class="post-card">
      <mat-card-header>
        <mat-card-title>{{ post.title }}</mat-card-title>
        <mat-card-subtitle>{{ post.createdAt | date:'medium' }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p>{{ post.content | slice:0:100 }}{{ post.content.length > 100 ? '...' : '' }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button [routerLink]="['/posts', post.id]">READ MORE</button>
      </mat-card-actions>
    </mat-card>

    <div *ngIf="posts.length === 0" class="no-posts">
      <p>No posts found. Be the first to post!</p>
    </div>
  </div>
</div>
