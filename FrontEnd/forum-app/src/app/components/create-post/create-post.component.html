<div class="container">
    <h2>Create New Post</h2>
    <form (ngSubmit)="createPost()">
        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Title</mat-label>
            <input matInput [(ngModel)]="post.title" name="title" required>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Content</mat-label>
            <textarea matInput [(ngModel)]="post.content" name="content" rows="6" required></textarea>
        </mat-form-field>

        <div class="actions">
            <button mat-raised-button color="primary" type="submit" [disabled]="!post.title || !post.content">Create
                Post</button>
            <button mat-button type="button" routerLink="/posts">Cancel</button>
        </div>
    </form>
</div>
