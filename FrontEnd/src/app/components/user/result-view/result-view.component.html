<div class="user-container">
    <div *ngIf="result" class="result-card glass">
        <h2>Test Results</h2>
        <div class="result-summary">
            <div class="score-display" [ngClass]="getScoreClass()">
                <span class="score-value">{{ result.score | number:'1.0-1' }}%</span>
                <span class="score-label">Score</span>
            </div>
            <div class="result-details">
                <div class="result-item">
                    <span class="label">Time Taken</span>
                    <span class="value">{{ ((result.responseTime || 0) / 1000) | number:'1.0-1' }}s</span>
                </div>
                <div class="result-item">
                    <span class="label">Date</span>
                    <span class="value">{{ result.takenAt | date:'medium' }}</span>
                </div>
            </div>
        </div>

        <div *ngIf="result.answers && result.answers.length > 0" class="answers-breakdown">
            <h3>Answer Breakdown</h3>
            <div *ngFor="let answer of result.answers; let i = index" class="answer-item"
                [class.correct]="answer.isCorrect" [class.incorrect]="!answer.isCorrect">
                <span class="q-num">Q{{ i + 1 }}</span>
                <span class="answer-status">{{ answer.isCorrect ? '✓ Correct' : '✗ Incorrect' }}</span>
            </div>
        </div>

        <div class="footer">
            <button class="btn btn-outline" [routerLink]="['/user/tests']">Take Another Test</button>
            <button class="btn btn-primary" [routerLink]="['/user/risks']">View My Risks</button>
        </div>
    </div>

    <div *ngIf="!result" class="loading glass">
        <p>Loading results...</p>
    </div>
</div>
