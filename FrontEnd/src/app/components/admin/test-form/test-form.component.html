<div class="admin-container">
    <div class="header">
        <h1>{{ isEditMode ? 'Edit' : 'Create' }} Cognitive Test</h1>
        <button class="btn btn-secondary" [routerLink]="['/admin/tests']">Back to List</button>
    </div>

    <form [formGroup]="testForm" (ngSubmit)="onSubmit()" class="glass form-container">
        <div class="form-group">
            <label for="title">Title</label>
            <input id="title" formControlName="title" placeholder="Test Title">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" formControlName="description" placeholder="Short description"></textarea>
        </div>

        <div class="questions-section">
            <h3>Questions</h3>
            <div formArrayName="questions">
                <div *ngFor="let q of questions.controls; let i=index" [formGroupName]="i" class="question-item">
                    <div class="question-header">
                        <h4>Question #{{ i + 1 }}</h4>
                        <button type="button" class="btn btn-icon danger" (click)="removeQuestion(i)">🗑</button>
                    </div>

                    <div class="form-group">
                        <input formControlName="questionText" placeholder="Enter question text">
                    </div>

                    <div class="form-group">
                        <label>Type</label>
                        <select formControlName="questionType">
                            <option *ngFor="let type of questionTypes" [value]="type">{{ type }}</option>
                        </select>
                    </div>

                    <div *ngIf="q.get('questionType')?.value === 'SIMPLE'" class="form-group">
                        <label>Correct Answer (Internal)</label>
                        <input formControlName="correctAnswer" placeholder="Enter the correct answer for auto-grading">
                    </div>

                    <!-- Options for MULTIPLE_CHOICE -->
                    <div *ngIf="q.get('questionType')?.value === 'MULTIPLE_CHOICE'" class="options-section">
                        <h5>Options</h5>
                        <div formArrayName="options">
                            <div *ngFor="let opt of getOptions(i).controls; let j=index" [formGroupName]="j"
                                class="option-item">
                                <input type="checkbox" formControlName="isCorrect">
                                <input formControlName="optionText" placeholder="Option text">
                                <button type="button" class="btn btn-icon danger"
                                    (click)="removeOption(i, j)">×</button>
                            </div>
                        </div>
                        <button type="button" class="btn btn-sm" (click)="addOption(i)">+ Add Option</button>
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-outline" (click)="addQuestion()">+ Add Question</button>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn btn-primary" [disabled]="testForm.invalid">Save Test</button>
        </div>
    </form>
</div>
