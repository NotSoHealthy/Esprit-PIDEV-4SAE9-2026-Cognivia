<div class="min-h-screen flex flex-col gap-6">
  <header class="flex items-center justify-between px-4 pt-4">
    <span class="flex items-center gap-10 ml-2!">
      <div class="aspect-square w-13.5">
        <img src="/logo.png" class="bg-white p-2 rounded-full w-full" />
      </div>
      <app-streak-flame
        *ngIf="userRole === 'ROLE_PATIENT'"
        [streakCount]="streakCount"
      ></app-streak-flame>
      <p class="font-bold text-xl tracking-wide">{{ currentRouteLabel }}</p>
    </span>
    <div class="flex items-center gap-5">
      <nz-badge [nzDot]="hasUnseenNotifications" [nzOffset]="[-2, 2]">
        <a
          nz-dropdown
          nzTrigger="click"
          [nzDropdownMenu]="notificationsMenu"
          nzPlacement="bottomRight"
          class="text-black!"
          (nzVisibleChange)="onNotificationsDropdownVisible($event)"
        >
          <nz-icon nzType="bell" nzTheme="outline" class="text-2xl" />
        </a>
      </nz-badge>
      <nz-dropdown-menu #notificationsMenu="nzDropdownMenu">
        <ul nz-menu class="min-w-80 max-w-96 bg-white rounded-2xl p-2 drop-shadow-sm">
          <li nz-menu-item *ngIf="notifications.length === 0" class="px-3! py-2! opacity-70">
            No notifications
          </li>

          <div *ngIf="notifications.length > 0" class="max-h-96 overflow-auto">
            <li
              nz-menu-item
              *ngFor="let n of notifications"
              (click)="openNotification(n)"
              class="whitespace-normal px-3! py-2! rounded-xl hover:bg-[#F2F6FE]! transition-colors"
              [ngClass]="!n.readAt ? 'bg-[#F2F6FE]!' : ''"
            >
              <div class="flex flex-col gap-1">
                <div class="flex items-start justify-between gap-3">
                  <span class="text-sm leading-snug" [class.font-semibold]="!n.readAt">
                    {{ n.title }}
                  </span>
                  <span
                    class="text-[11px] font-semibold shrink-0 px-2 py-0.5 rounded-full whitespace-nowrap"
                    [ngClass]="priorityPillClass(n.priority)"
                  >
                    {{ n.priority }}
                  </span>
                </div>
                <span class="text-xs leading-snug opacity-80">{{ n.message }}</span>
              </div>
            </li>
          </div>
        </ul>
      </nz-dropdown-menu>
      <a
        nz-dropdown
        nzTrigger="click"
        [nzDropdownMenu]="menu"
        nzPlacement="bottomCenter"
        class="text-black!"
      >
        <div class="flex rounded-full bg-[#F2F6FE] p-2 gap-2 items-center drop-shadow-sm">
          <span
            class="rounded-full aspect-square w-8 bg-[#B4BEF0] text-center content-center font-bold text-[#4D5CAB] drop-shadow-xs"
          >
            {{
              (fullName ? fullName[0] + fullName.split(' ').slice(-1)[0][0] : username[0])
                | uppercase
            }}
          </span>
          <p class="ml-2 content-center font-semibold">{{ fullName ?? username | titlecase }}</p>
          <span class="flex flex-col">
            <nz-icon nzType="up" nzTheme="outline" />
            <nz-icon nzType="down" nzTheme="outline" />
          </span>
        </div>
      </a>
      <nz-dropdown-menu #menu="nzDropdownMenu">
        <ul nz-menu class="min-w-48">
          <li nz-menu-item routerLink="/profile">Profile</li>
          <li nz-menu-item *ngIf="userRole === 'ROLE_PATIENT'" routerLink="/careteam">
            View care team
          </li>
          <li nz-menu-item>Settings</li>
          <li nz-menu-divider></li>
          <li nz-menu-item (click)="logout()">Sign out</li>
        </ul>
      </nz-dropdown-menu>
    </div>
  </header>

  <div class="flex flex-1 min-h-0">
    <aside class="w-fit shrink-0 px-4 py-3">
      <nav class="flex flex-col gap-2 bg-[#F2F6FE] rounded-full w-fit p-2">
        <ng-container *ngFor="let route of routes">
          <span
            *ngIf="userRole && route.roles.includes(userRole)"
            nz-tooltip
            [nzTooltipTitle]="route.label"
            nzTooltipPlacement="right"
            [nzTooltipColor]="'#4D5CAB'"
            class="rounded-full text-[#4D5CAB] hover:text-white"
          >
            <nz-icon
              [routerLink]="route.link"
              routerLinkActive="!bg-[#4D5CAB] !text-white"
              [nzType]="route.icon"
              nzTheme="outline"
              class="w-fit text-[30px] bg-white p-3 rounded-full hover:bg-[#4D5CAB] transition-colors duration-200"
            />
          </span>
        </ng-container>
      </nav>
    </aside>

    <main class="flex-1 min-w-0 p-4 pr-8 overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
