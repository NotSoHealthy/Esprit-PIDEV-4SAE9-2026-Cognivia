<div class="max-w-5xl mx-auto! flex flex-col gap-4 bg-white rounded-3xl p-6 sm:p-8 drop-shadow-sm">
  <div class="flex items-start justify-between gap-4 mb-6">
    <h1 class="text-2xl font-bold! tracking-wide text-[#4D5CAB]">Edit profile</h1>
    <p class="text-[#4D5CAB]/80 mt-1">Update your personal information.</p>
  </div>
  <form
    nz-form
    nzLayout="vertical"
    [formGroup]="validateForm"
    (ngSubmit)="submit()"
    class="space-y-6"
  >
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <nz-form-item class="m-0">
        <nz-form-label nzFor="firstName" class="text-[#4D5CAB] font-semibold"
          >First name</nz-form-label
        >
        <nz-form-control nzErrorTip="Please input your first name!">
          <input
            nz-input
            id="firstName"
            formControlName="firstName"
            placeholder="Enter your first name"
            class="rounded-xl!"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="m-0">
        <nz-form-label nzFor="lastName" class="text-[#4D5CAB] font-semibold"
          >Last name</nz-form-label
        >
        <nz-form-control nzErrorTip="Please input your last name!">
          <input
            nz-input
            id="lastName"
            formControlName="lastName"
            placeholder="Enter your last name"
            class="rounded-xl!"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="m-0">
        <nz-form-label nzFor="specialty" class="text-[#4D5CAB] font-semibold"
          >Specialty</nz-form-label
        >
        <nz-form-control nzErrorTip="Please input your specialty!">
          <input
            nz-input
            id="specialty"
            formControlName="specialty"
            placeholder="Enter your specialty"
            class="rounded-xl!"
          />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item class="m-0">
        <nz-form-label nzFor="licenseNumber" class="text-[#4D5CAB] font-semibold"
          >License number</nz-form-label
        >
        <nz-form-control nzErrorTip="Please input a valid license number!">
          <input
            nz-input
            id="licenseNumber"
            formControlName="licenseNumber"
            placeholder="Enter your license number"
            class="rounded-xl!"
          />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div class="flex items-center justify-end gap-3 pt-2">
      <button nz-button nzType="primary" type="submit" class="rounded-full! px-6">
        Save changes
      </button>
    </div>
  </form>
</div>
