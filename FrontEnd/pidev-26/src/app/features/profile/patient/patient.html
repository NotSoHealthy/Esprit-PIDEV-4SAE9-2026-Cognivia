<div class="p-8 max-w-2xl mx-auto">
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold text-gray-800">Profile Settings</h1>
    <button (click)="goBack()" class="text-blue-600 hover:underline cursor-pointer">Back to Dashboard</button>
  </div>

  <div *ngIf="isLoading" class="flex justify-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="!isLoading" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 space-y-6">
    <div class="grid grid-cols-2 gap-6">
      <div class="space-y-2">
        <label class="text-sm font-semibold text-gray-500 uppercase tracking-wider">First Name</label>
        <input type="text" [(ngModel)]="patientInformation.firstName"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
      </div>
      <div class="space-y-2">
        <label class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Last Name</label>
        <input type="text" [(ngModel)]="patientInformation.lastName"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
      </div>
    </div>

    <div class="space-y-2">
      <label class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Date of Birth</label>
      <input type="date" [(ngModel)]="patientInformation.dateOfBirth"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all" />
    </div>

    <div class="space-y-2">
      <label class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Gender</label>
      <select [(ngModel)]="patientInformation.gender"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all">
        <option value="MALE">Male</option>
        <option value="FEMALE">Female</option>
        <option value="OTHER">Other</option>
      </select>
    </div>

    <div class="pt-6">
      <button (click)="saveProfile()" [disabled]="isSaving"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98] disabled:opacity-50 cursor-pointer">
        {{ isSaving ? 'Saving Changes...' : 'Update Profile' }}
      </button>
    </div>
  </div>
</div>
