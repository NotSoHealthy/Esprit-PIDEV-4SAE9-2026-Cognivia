<div class="create-page">

  <!-- Back header -->
  <div class="create-header">
    <button class="back-btn" (click)="cancel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Back to Tasks
    </button>
  </div>

  <!-- Card -->
  <div class="create-card">
    <div class="create-card-header">
      <div class="create-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" />
          <rect x="9" y="3" width="6" height="4" rx="1" />
          <line x1="12" y1="12" x2="12" y2="18" />
          <line x1="9" y1="15" x2="15" y2="15" />
        </svg>
      </div>
      <div>
        <h1 class="create-title">New Care Task</h1>
        <p class="create-subtitle">Assign a task to a patient</p>
      </div>
    </div>

    <form (ngSubmit)="submit()" #f="ngForm" class="create-form">

      <div class="form-row">
        <div class="form-group" *ngIf="isStaff">
          <label class="form-label">Patient ID <span class="required">*</span></label>
          <input class="form-input" name="patientId" type="number" [(ngModel)]="model.patientId" required min="1"
            placeholder="e.g. 101" />
        </div>
        <!-- patientId is automatically set for patients (if they could access this), but they are redirected. -->
        <div class="form-group">
          <label class="form-label">Task Type</label>
          <select class="form-input" name="taskType" [(ngModel)]="model.taskType">
            <option *ngFor="let type of taskTypes" [value]="type">{{ type }}</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Task Description <span class="required">*</span></label>
        <input class="form-input" name="task" [(ngModel)]="model.task" required
          placeholder="Describe what needs to be done…" />
      </div>

      <div class="form-group">
        <label class="form-label">Due Date &amp; Time</label>
        <input class="form-input" name="dueAt" type="datetime-local" [(ngModel)]="model.dueAt" />
      </div>

      <!-- Error -->
      <div class="error-msg" *ngIf="error">{{ error }}</div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="saving">
          <span *ngIf="saving" class="spinner-sm"></span>
          {{ saving ? 'Creating…' : 'Create Task' }}
        </button>
      </div>

    </form>
  </div>

</div>
